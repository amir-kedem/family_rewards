services:
  - type: web
    name: family-rewards
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app_flet.py
    envVars:
      - key: FLET_FORCE_WEB_SERVER
        value: "true"
      - key: FLET_SERVER_IP
        value: 0.0.0.0
      - key: POINT_SYSTEM_SPREADSHEET
        sync: false
      - key: POINT_SYSTEM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: POINT_SYSTEM_ADMIN_PASSWORD
        sync: false
